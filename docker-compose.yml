services:
  frontend:
    build:
      context: ../analisis-datos-sii2-frontend
      dockerfile: Dockerfile.dev
    container_name: sii2_frontend
    user: "1000:1000"
    ports:
      - "3000:3000"
    volumes:
      - ../analisis-datos-sii2-frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sii2_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ../analisis-datos-sii2-datasets:/app-data/datasets
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/sii2_db
      - DATASETS_STORAGE_DIR=/app-data/datasets
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: sii2_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: sii2_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: sii2_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
